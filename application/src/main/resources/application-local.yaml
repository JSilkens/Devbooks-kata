spring:
  docker:
    compose:
      lifecycle-management: start-and-stop
      enabled: true
      file: ../docker-database.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/shopping
    username: devbooks
    password: devbooks
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    check-location: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true