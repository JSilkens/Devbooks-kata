management:
  endpoint:
    health:
      probes:
        enabled: true

server:
  forward-headers-strategy: framework

spring:
  data:
    web:
      pageable:
        default-page-size: 10
  jpa:
    defer-datasource-initialization: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  mvc:
    problemdetails:
      enabled: true

springdoc:
  swagger-ui:
    path: '/'