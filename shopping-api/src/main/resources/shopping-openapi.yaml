openapi: 3.1.0
info:
  title: Devbooks
  description: Devbooks shopping API
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
  - url: 'https://devbooks.jsilkens.be'
tags:
  - name: Book
    description: Actions on books
  - name: Cart
    description: Actions on the shopping cart
paths:
  /book/{isbn}:
    get:
      tags:
        - Book
      summary: Get a book by its ISBN number
      operationId: getBookByIsbn
      parameters:
        - name: isbn
          in: path
          required: true
          description: The ISBN-13 of the book to retrieve
          schema:
            type: string
            pattern: '^\d{13}$'
      responses:
        '200':
          description: Successfully retrieved the book
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDTO'
        '400':
          description: Invalid ISBN format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'
        '404':
          description: Book not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetail'

components:
  schemas:
    BookDTO:
      type: object
      required:
        - title
        - author
        - publication_year
        - isbn
        - price
      properties:
        title:
          type: string
          example: "Clean Code"
        author:
          type: string
          example: "Robert C. Martin"
        publication_year:
          type: integer
          example: 2008
        isbn:
          type: string
          example: "9780132350884"
        price:
          $ref: '#/components/schemas/Price'

    Price:
      type: object
      required:
        - value
        - currency
      properties:
        value:
          type: number
          format: double
          example: 50.00
        currency:
          type: string
          example: "EUR"

    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
          description: A URI reference that identifies the problem type.
          example: "about:blank"
        title:
          type: string
          description: A short, human-readable summary of the problem type.
          example: "Not Found"
        status:
          type: integer
          description: The HTTP status code.
          example: 404
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem.
          example: "Book not found"
        instance:
          type: string
          format: uri
          description: A URI reference that identifies the specific occurrence of the problem.
          example: "/api/book/9780132350884"
